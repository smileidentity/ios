# Triggered when an automated release PR (branch: release/ios-sdk-v*) from the
# ios-sdk repo is merged into main. Tags the merge commit, creates the public
# GitHub release with artifacts mirrored from ios-sdk, pushes both podspecs to
# CocoaPods Trunk, and opens a release-notes PR syncing CHANGELOG.md.
#
# Required secrets: GH_PAT, COCOAPODS_TRUNK_TOKEN

name: Release on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-on-merge
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/ios-sdk-v')
    runs-on: macos-15
    env:
      MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
    steps:
      - name: Extract version from branch name
        id: version
        env:
          BRANCH_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          version="${BRANCH_REF#release/ios-sdk-v}"
          if [[ -z "${version}" || "${version}" == "${BRANCH_REF}" ]]; then
            echo "::error::Failed to extract version from branch"
            exit 1
          fi
          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?(\+[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Extracted version is not a valid semver"
            exit 1
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Checkout merge commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.MERGE_SHA }}
          fetch-depth: 0

      - name: Tag merge commit
        run: |
          set -euo pipefail
          git config user.name "Smile ID Release Bot"
          git config user.email "mobile@smileidentity.com"

          existing_refs="$(git ls-remote origin "refs/tags/v${RELEASE_VERSION}" || true)"
          if [[ -n "${existing_refs}" ]]; then
            if printf '%s\n' "${existing_refs}" | awk '{print $1}' | grep -qx "${MERGE_SHA}"; then
              echo "Tag v${RELEASE_VERSION} already points to ${MERGE_SHA}; skipping"
              exit 0
            fi
            echo "::error::Tag v${RELEASE_VERSION} already exists but does not point to merge commit ${MERGE_SHA}"
            echo "::error::Existing refs:"
            printf '%s\n' "${existing_refs}" | sed 's/^/::error::  /'
            echo "::error::Refusing to overwrite a published tag. Delete it manually if this is intentional."
            exit 1
          fi

          git tag "v${RELEASE_VERSION}" "${MERGE_SHA}"
          git push origin "refs/tags/v${RELEASE_VERSION}"

      - name: Download artifacts from ios-sdk release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          gh release download "v${RELEASE_VERSION}" \
            --repo smileidentity/ios-sdk \
            --pattern "*.zip" \
            --pattern "*.zip.sha256" \
            --dir artifacts
          ls -la artifacts

      - name: Verify artifact checksums
        run: |
          set -euo pipefail
          shopt -s nullglob
          zips=(artifacts/*.zip)
          if [[ ${#zips[@]} -eq 0 ]]; then
            echo "::error::No .zip artifacts found to verify"
            exit 1
          fi
          for zip in "${zips[@]}"; do
            sha_file="${zip}.sha256"
            if [[ ! -f "${sha_file}" ]]; then
              echo "::error::Missing companion ${sha_file}"
              exit 1
            fi
            expected="$(tr -d '[:space:]' < "${sha_file}")"
            actual="$(swift package compute-checksum "${zip}")"
            if [[ "${expected}" != "${actual}" ]]; then
              echo "::error::Checksum mismatch for $(basename "${zip}")"
              echo "  expected: ${expected}"
              echo "  actual:   ${actual}"
              exit 1
            fi
            echo "OK $(basename "${zip}"): ${actual}"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: SmileID iOS SDK v${{ env.RELEASE_VERSION }}
          target_commitish: ${{ env.MERGE_SHA }}
          make_latest: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/*.zip
            artifacts/*.zip.sha256

      - name: Setup Ruby and CocoaPods
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1
        with:
          ruby-version: "3.2"
          bundler-cache: false
      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Push SmileIDSDK.podspec to CocoaPods Trunk
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: pod trunk push SmileIDSDK.podspec --allow-warnings

      - name: Wait for SmileIDSDK to appear on the CocoaPods CDN
        run: |
          set -euo pipefail
          pod_name="SmileIDSDK"
          hash=$(printf '%s' "${pod_name}" | md5)
          url="https://cdn.cocoapods.org/Specs/${hash:0:1}/${hash:1:1}/${hash:2:1}/${pod_name}/${RELEASE_VERSION}/${pod_name}.podspec.json"
          echo "Polling ${url}"
          for i in $(seq 1 40); do
            if curl -sfLI "${url}" > /dev/null; then
              echo "${pod_name} v${RELEASE_VERSION} indexed on attempt ${i}"
              exit 0
            fi
            echo "attempt ${i}/40: not yet indexed, sleeping 15s"
            sleep 15
          done
          echo "::error::Timed out waiting for ${pod_name} v${RELEASE_VERSION} on the CocoaPods CDN after 10 minutes"
          exit 1

      - name: Push SmileID.podspec to CocoaPods Trunk
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: pod trunk push SmileID.podspec --allow-warnings

      - name: Prepare CHANGELOG update on main
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          gh api repos/smileidentity/ios-sdk/contents/CHANGELOG.md \
            --jq '.content' | base64 --decode > /tmp/sdk-changelog.md

          section=$(awk -v ver="${RELEASE_VERSION}" '
            $0 ~ "^## " ver "([[:space:]]|$)" { found=1; print; next }
            found && /^## / { exit }
            found { print }
          ' /tmp/sdk-changelog.md)

          if [[ -z "${section}" ]]; then
            echo "::warning::No CHANGELOG section found for v${RELEASE_VERSION} in ios-sdk; skipping sync"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          if awk -v ver="${RELEASE_VERSION}" '
            $0 ~ "^## " ver "([[:space:]]|$)" { found=1; exit }
            END { exit !found }
          ' CHANGELOG.md; then
            echo "CHANGELOG.md already contains v${RELEASE_VERSION} entry; skipping sync"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            head -n 1 CHANGELOG.md
            echo
            printf '%s\n' "${section}"
            tail -n +2 CHANGELOG.md
          } > /tmp/changelog-new.md
          mv /tmp/changelog-new.md CHANGELOG.md

          if git diff --quiet CHANGELOG.md; then
            echo "CHANGELOG.md unchanged; nothing to commit"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create CHANGELOG PR
        if: steps.changelog.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: "chore: sync CHANGELOG for v${{ env.RELEASE_VERSION }}"
          title: "iOS v${{ env.RELEASE_VERSION }} Release Notes"
          body: Automated PR to sync release notes from the ios-sdk CHANGELOG.
          branch: release-notes/v${{ env.RELEASE_VERSION }}
          base: main
          labels: "release-notes"
          team-reviewers: "smileidentity/mobile"
