# Required secrets: GH_PAT, COCOAPODS_TRUNK_TOKEN

name: Release on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-on-merge
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/ios-sdk-v')
    runs-on: macos-15
    env:
      MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
    steps:
      - name: Extract version from branch name
        id: version
        env:
          BRANCH_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          version="${BRANCH_REF#release/ios-sdk-v}"
          if [[ -z "${version}" || "${version}" == "${BRANCH_REF}" ]]; then
            echo "::error::Failed to extract version from branch"
            exit 1
          fi
          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?(\+[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Extracted version is not a valid semver"
            exit 1
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Checkout merge commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.MERGE_SHA }}
          fetch-depth: 0

      - name: Tag merge commit
        run: |
          set -euo pipefail
          git config user.name "Smile ID Release Bot"
          git config user.email "mobile@smileidentity.com"

          existing_refs="$(git ls-remote origin "refs/tags/v${RELEASE_VERSION}" || true)"
          if [[ -n "${existing_refs}" ]]; then
            if printf '%s\n' "${existing_refs}" | awk '{print $1}' | grep -qx "${MERGE_SHA}"; then
              echo "Tag v${RELEASE_VERSION} already points to ${MERGE_SHA}; skipping"
              exit 0
            fi
            echo "::error::Tag v${RELEASE_VERSION} already exists but does not point to merge commit ${MERGE_SHA}"
            echo "::error::Existing refs:"
            printf '%s\n' "${existing_refs}" | sed 's/^/::error::  /'
            echo "::error::Refusing to overwrite a published tag. Delete it manually if this is intentional."
            exit 1
          fi

          git tag "v${RELEASE_VERSION}" "${MERGE_SHA}"
          git push origin "refs/tags/v${RELEASE_VERSION}"

      - name: Download artifacts from ios-sdk release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          gh release download "v${RELEASE_VERSION}" \
            --repo smileidentity/ios-sdk \
            --pattern "*.zip" \
            --pattern "*.zip.sha256" \
            --dir artifacts
          ls -la artifacts

      - name: Verify artifact checksums
        run: |
          set -euo pipefail
          shopt -s nullglob
          zips=(artifacts/*.zip)
          if [[ ${#zips[@]} -eq 0 ]]; then
            echo "::error::No .zip artifacts found to verify"
            exit 1
          fi
          for zip in "${zips[@]}"; do
            sha_file="${zip}.sha256"
            if [[ ! -f "${sha_file}" ]]; then
              echo "::error::Missing companion ${sha_file}"
              exit 1
            fi
            expected="$(tr -d '[:space:]' < "${sha_file}")"
            actual="$(swift package compute-checksum "${zip}")"
            if [[ "${expected}" != "${actual}" ]]; then
              echo "::error::Checksum mismatch for $(basename "${zip}")"
              echo "  expected: ${expected}"
              echo "  actual:   ${actual}"
              exit 1
            fi
            echo "OK $(basename "${zip}"): ${actual}"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: SmileID iOS SDK v${{ env.RELEASE_VERSION }}
          target_commitish: ${{ env.MERGE_SHA }}
          make_latest: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/*.zip
            artifacts/*.zip.sha256

      - name: Setup Ruby and CocoaPods
        uses: ruby/setup-ruby@97ecb7b512899eb71ab1bf2310a624c6f1589ac6 # v1
        with:
          ruby-version: "3.2"
          bundler-cache: false
      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Push SmileIDSDK.podspec to CocoaPods Trunk
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: pod trunk push SmileIDSDK.podspec --allow-warnings
